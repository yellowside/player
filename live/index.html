<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="renderer" content="webkit">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0 ,maximum-scale=1.0, user-scalable=no">
<title>Dplayer Live</title>
<style type="text/css">body, html, .dplayer{padding: 0;margin: 0;width: 100%;height: 100%;text-align:center;background-color:#000;}.dplayer-info-panel-item-url{display:none!important}</style>
<link rel="stylesheet" href="../js/DPlayer.min.css">
<script type="text/javascript" src="../js/DPlayer.min.js"></script>
<script type="text/javascript" src="../js/flv.min.js"></script>
<script type="text/javascript" src="../js/hls.min.js"></script>
</head>
<body oncontextmenu="return false" onselectstart="return false" style="overflow-y:hidden;">
<div id="player" class="dplayer"></div>
<script type="text/javascript">
const urlParams = new URLSearchParams(window.location.search);
let videoUrl = urlParams.get('url');
if (videoUrl) {
    if (/^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$/.test(videoUrl)) {
        try {
            videoUrl = atob(videoUrl);
        } catch (e) {
            console.error('Base64解码失败', e);
        }
    }
}
var dplayer = new DPlayer({
    element: document.getElementById("player"),
    autoplay: true,
    live: true,
    mutex: true,
    video: {
        url: videoUrl,
        type: 'hls',
        pic: '../js/loading.gif'
    },
    contextmenu: [{text: "冰豆云播", link: "https://www.bingdou.vip/"}]
});
</script>
<script async src="https://019e38af-1fe6-7b6a-bbd5-bcc86c1e6d91.spst2.com/ustat.js"></script>
</body>
</html>
