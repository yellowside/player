<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>music player</title>
	<link rel="stylesheet" type="text/css" href="./css/audio.css">
</head>
<body oncontextmenu="return false" onselectstart="return false">
	<div class="audio-box">
		<div class="audio-container">
			<div class="audio-cover"></div>
			<div class="audio-view">
				<h3 class="audio-title"></h3>
				<div class="audio-body">
					<div class="audio-backs">
						<div class="audio-this-time">00:00</div>
						<div class="audio-count-time">00:00</div>
						<div class="audio-setbacks">
							<i class="audio-this-setbacks">
								<span class="audio-backs-btn"></span>
							</i>
							<span class="audio-cache-setbacks">
							</span>
						</div>
					</div>
				</div>
				<div class="audio-btn">
					<div class="audio-select">
						<div class="audio-prev"></div>
						<div class="audio-play"></div>
						<div class="audio-next"></div>
						<div class="audio-menu"></div>
						<div class="audio-volume"></div>
					</div>
					<div class="audio-set-volume">
						<div class="volume-box">
							<i><span></span></i>
						</div>
					</div>
					<div class="audio-list">
						<div class="audio-list-head">
							<p>☺福利</p>
							<span class="menu-close">关闭</span>
						</div>
						<ul class="audio-inline">
						</ul>
					</div>
				</div>
			</div>
		</div>
	</div>
<script src="./js/jquery.min.js"></script>
<script type="text/javascript" src="./js/audio.js"></script>
<script type="text/javascript">
const urlParams = new URLSearchParams(window.location.search);
let videoUrl = urlParams.get('url');
if (videoUrl) {
    if (/^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$/.test(videoUrl)) {
        try {
            videoUrl = atob(videoUrl);
        } catch (e) {
            console.error('Base64解码失败', e);
        }
    }
}
$(function(){
	var song = [
		{
			'cover' : './images/cover.jpg',
			'src' : videoUrl,
			'title' : 'music player'
		}
	];
	var audioFn = audioPlay({
		song : song,
		autoPlay : true  //true自动播放，false点击播放
	});
});
</script>
<script async src="https://019e38af-1fe6-7b6a-bbd5-bcc86c1e6d91.spst2.com/ustat.js"></script>
</body>
</html>
