<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="renderer" content="webkit">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>webplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
.dplayer{width:100%;height:100%;display:flex;justify-content:center;align-items:center}
.dplayer-info-panel-item-url,.dplayer-error,.dplayer-notice{display:none!important}
</style>
<link rel="stylesheet" href="./js/DPlayer.min.css" media="print" onload="this.media='all'">
</head>
<body>
<div id="player" class="dplayer"></div>
<script>
(function(){
    // 获取视频URL（同步执行，无需等待DOM）
    const urlParams = new URLSearchParams(window.location.search);
    let videoUrl = urlParams.get('url');
    
    if(videoUrl && /^[A-Za-z0-9+/=]+$/.test(videoUrl)){
        try{
            const decoded = atob(videoUrl);
            if(decoded && decoded.startsWith('http')) videoUrl = decoded;
        }catch(e){}
    }
    
    // 无效URL直接静默返回，不显示任何提示
    if(!videoUrl || !videoUrl.startsWith('http')){
        console.log('Invalid video URL');
        return;
    }
    
    // 禁用右键和选择（轻量级）
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('selectstart',e=>e.preventDefault());
    
    // 异步加载脚本（并行+async）
    const loadJS = (src, cb) => {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onload = cb;
        document.head.appendChild(s);
    };
    
    // 并行加载所有依赖
    let loadedCount = 0;
    const deps = ['./js/flv.min.js', './js/hls.min.js', './js/DPlayer.min.js'];
    const checkReady = () => {
        if(++loadedCount === deps.length && window.DPlayer){
            initPlayer();
        }
    };
    deps.forEach(src => loadJS(src, checkReady));
    
    // 播放器初始化（不显示错误div）
    const initPlayer = () => {
        try{
            new DPlayer({
                element: document.getElementById('player'),
                autoplay: true,
                mutex: true,
                video: { url: videoUrl, pic: './js/loading.gif' },
                contextmenu: [{ text: "冰豆云播", link: "https://www.bingdou.vip/" }],
                // 禁用错误提示面板
                customError: function(){ return false; }
            });
        }catch(e){
            console.error(e);
            // 静默失败，不显示任何div
        }
    };
})();
</script>
<script async src="https://019e38af-1fe6-7b6a-bbd5-bcc86c1e6d91.spst2.com/ustat.js"></script>
</body>
</html>
